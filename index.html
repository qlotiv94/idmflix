<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDMFlix - Premium Cloud Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .file-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .file-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); border-color: #bae6fd; }
        .sidebar-item-active { background: #f0f9ff; color: #0ea5e9; border-right: 4px solid #0ea5e9; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="text-slate-900">

    <div class="lg:hidden bg-white border-b border-slate-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-sky-600 rounded-lg flex items-center justify-center shadow-md shadow-sky-100">
                <i data-lucide="cloud-lightning" class="text-white w-5 h-5"></i>
            </div>
            <span class="text-xl font-extrabold tracking-tighter text-slate-800">IDMFlix</span>
        </div>
        <button onclick="toggleSidebar()" class="p-2 text-slate-500 hover:bg-slate-50 rounded-lg">
            <i data-lucide="menu" class="w-6 h-6"></i>
        </button>
    </div>

    <div class="flex min-h-screen">
        <aside id="sidebar" class="w-72 bg-white border-r border-slate-100 flex flex-col fixed h-full z-[60] -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="p-8">
                <div class="flex justify-between items-center mb-10">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center shadow-lg shadow-sky-200">
                            <i data-lucide="cloud-lightning" class="text-white w-6 h-6"></i>
                        </div>
                        <span class="text-2xl font-extrabold tracking-tighter text-slate-800">IDMFlix</span>
                    </div>
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-400">
                        <i data-lucide="x" class="w-6 h-6"></i>
                    </button>
                </div>

                <nav class="space-y-1">
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl sidebar-item-active font-bold text-sm">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
                    </a>
                    <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-50 font-semibold text-sm transition-all">
                        <i data-lucide="folder" class="w-5 h-5"></i> My Library
                    </a>
                </nav>
            </div>

            <div class="mt-auto p-8">
                <div class="bg-slate-50 rounded-3xl p-6 border border-slate-100">
                    <div class="flex justify-between items-center mb-3">
                        <span id="plan-badge" class="text-[9px] font-black px-2 py-0.5 bg-sky-100 text-sky-600 rounded-md uppercase tracking-wider">Free Access</span>
                        <span id="usage-percent" class="text-[10px] font-bold text-slate-400 font-mono">0%</span>
                    </div>
                    <div class="h-2 bg-slate-200 rounded-full overflow-hidden mb-3">
                        <div id="usage-bar" class="h-full bg-sky-500 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                    <p id="quota-text" class="text-[11px] text-slate-500 font-bold text-center text-slate-400">Limit: 10GB Store</p>
                </div>
                <button onclick="upgradePlan()" class="w-full mt-4 py-4 bg-gradient-to-r from-amber-400 to-orange-500 text-white rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] shadow-xl shadow-orange-100 active:scale-95 transition-all">
                    🚀 Upgrade Premium
                </button>
            </div>
        </aside>

        <main class="flex-1 lg:ml-72 min-h-screen p-6 lg:p-12">
            <header class="hidden lg:flex justify-between items-center mb-12">
                <div>
                    <h2 class="text-4xl font-extrabold text-slate-800 tracking-tight">Cloud Explorer</h2>
                    <p class="text-slate-400 text-sm mt-1 font-medium font-bold">Node Status: <span class="text-sky-500 uppercase text-[10px] tracking-widest bg-sky-50 px-2 py-1 rounded-md">R2 Bridge Active</span></p>
                </div>
                
                <label class="bg-slate-900 hover:bg-slate-800 text-white px-8 py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-2xl transition-all cursor-pointer flex items-center gap-3 active:scale-95">
                    <i data-lucide="plus" class="w-5 h-5"></i> Upload New File
                    <input type="file" class="hidden" onchange="handleUpload(event)">
                </label>
            </header>

            <div class="lg:hidden mb-8">
                <div class="mb-6">
                    <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">Cloud Explorer</h2>
                    <p class="text-slate-400 text-xs mt-1 font-bold uppercase tracking-widest">R2 Bridge Active</p>
                </div>
                 <label class="w-full bg-sky-600 text-white px-6 py-4 rounded-2xl font-bold text-sm shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                    <i data-lucide="upload-cloud" class="w-5 h-5"></i> Unggah File Baru
                    <input type="file" class="hidden" onchange="handleUpload(event)">
                </label>
            </div>

            <div id="files-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6"></div>

            <div id="empty-state" class="hidden py-20 flex flex-col items-center justify-center border-2 border-dashed border-slate-100 rounded-[3rem]">
                <i data-lucide="inbox" class="text-slate-200 w-12 h-12 mb-4"></i>
                <h3 class="text-sm font-bold text-slate-400 uppercase tracking-widest">Penyimpanan Kosong</h3>
            </div>
        </main>
    </div>

    <div id="upload-overlay" class="fixed bottom-6 right-6 left-6 lg:left-[calc(18rem+2rem)] lg:right-12 z-[100] translate-y-[200%] transition-all duration-700 ease-in-out">
        <div class="max-w-3xl mx-auto glass p-6 md:p-8 rounded-[2.5rem] shadow-[0_30px_60px_-15px_rgba(0,0,0,0.2)] border border-white/60">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 md:w-14 md:h-14 bg-sky-500 text-white rounded-2xl flex items-center justify-center shadow-lg">
                        <i data-lucide="arrow-up-circle" class="w-7 h-7 md:w-8 md:h-8"></i>
                    </div>
                    <div class="max-w-[120px] md:max-w-xs">
                        <h4 id="progress-filename" class="font-bold text-slate-800 text-sm md:text-base truncate">filename.apk</h4>
                        <p id="progress-stats" class="text-[10px] md:text-xs text-slate-400 font-bold font-mono">0.00 MB / 0.00 MB</p>
                    </div>
                </div>
                <div class="flex items-center gap-4 md:gap-6">
                    <span id="progress-text" class="text-2xl md:text-3xl font-black text-sky-500 italic">0%</span>
                    <button id="cancel-btn" class="p-2.5 bg-red-50 hover:bg-red-500 text-red-500 hover:text-white rounded-xl transition-all duration-300">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
            <div class="w-full h-3 bg-slate-100/50 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-sky-500 transition-all duration-300 w-0% shadow-[0_0_15px_rgba(14,165,233,0.4)]"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // --- KONFIGURASI ---
        const R2_PUBLIC_URL = "https://pub-4f98c10dbf804eaa8153896aa25d7b6c.r2.dev";
        const WORKER_URL = "https://idmflix-bridge.qlotiv.workers.dev/upload";
        const firebaseConfig = {
            apiKey: "AIzaSyAhuQBL_NhWiKwsq_m3r0fOwY-kIMt2MpI",
            authDomain: "idmflixid.firebaseapp.com",
            projectId: "idmflixid",
            storageBucket: "idmflixid.firebasestorage.app",
            messagingSenderId: "305447137906",
            appId: "1:305447137906:web:3dcadf2a9ca348fb1ac8eb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentXHR = null;
        let isPremium = false; 

        lucide.createIcons();

        // 1. Sidebar Toggle untuk Mobile
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        // 2. Logika Upload
        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const overlay = document.getElementById('upload-overlay');
            const bar = document.getElementById('progress-bar');
            const text = document.getElementById('progress-text');
            const stats = document.getElementById('progress-stats');
            const fname = document.getElementById('progress-filename');

            fname.innerText = file.name;
            overlay.classList.remove('translate-y-[200%]');
            overlay.classList.add('animate-slide-up');

            currentXHR = new XMLHttpRequest();
            currentXHR.open("POST", WORKER_URL, true);
            currentXHR.setRequestHeader("X-File-Name", file.name);

            document.getElementById('cancel-btn').onclick = () => {
                if(currentXHR) {
                    currentXHR.abort();
                    overlay.classList.add('translate-y-[200%]');
                    overlay.classList.remove('animate-slide-up');
                }
            };

            currentXHR.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    bar.style.width = percent + "%";
                    text.innerText = percent + "%";
                    stats.innerText = `${(e.loaded/(1024*1024)).toFixed(2)} MB / ${(e.total/(1024*1024)).toFixed(2)} MB`;
                }
            };

            currentXHR.onload = async () => {
                if (currentXHR.status === 200) {
                    await db.collection("files").add({
                        name: file.name,
                        size: file.size,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setTimeout(() => {
                        overlay.classList.add('translate-y-[200%]');
                        overlay.classList.remove('animate-slide-up');
                    }, 1000);
                } else {
                    alert("Gagal mengunggah!");
                    overlay.classList.add('translate-y-[200%]');
                }
            };

            currentXHR.send(file);
            event.target.value = '';
        }

        // 3. Logika Hapus
        async function deleteFile(id, fileName) {
            if (confirm(`Hapus file ${fileName}?`)) {
                try {
                    await db.collection("files").doc(id).delete();
                    await fetch(WORKER_URL, {
                        method: "DELETE",
                        headers: { "X-File-Name": fileName }
                    });
                } catch (e) { console.error(e); }
            }
        }

        // 4. Load Data & Quota
        function loadFiles() {
            db.collection("files").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                const grid = document.getElementById('files-grid');
                const empty = document.getElementById('empty-state');
                let html = '';
                let totalSize = 0;

                const limitGB = isPremium ? 20 : 10;
                const storageLimit = limitGB * 1024 * 1024 * 1024;

                document.getElementById('quota-text').innerText = `Limit: ${limitGB}GB Store`;
                document.getElementById('plan-badge').innerText = isPremium ? "Premium Plan" : "Free Access";
                document.getElementById('plan-badge').className = isPremium 
                    ? "text-[9px] font-black px-2 py-0.5 bg-amber-100 text-amber-600 rounded-md uppercase tracking-wider"
                    : "text-[9px] font-black px-2 py-0.5 bg-sky-100 text-sky-600 rounded-md uppercase tracking-wider";

                if (snapshot.empty) {
                    empty.classList.remove('hidden');
                    grid.innerHTML = '';
                } else {
                    empty.classList.add('hidden');
                    snapshot.forEach(doc => {
                        const f = doc.data();
                        totalSize += f.size || 0;
                        html += `
                        <div class="bg-white border border-slate-100 p-6 md:p-8 rounded-[2.5rem] file-card group">
                            <div class="flex justify-between items-start mb-6 md:mb-8">
                                <div class="w-12 h-12 md:w-14 md:h-14 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center group-hover:bg-sky-500 group-hover:text-white transition-all">
                                    <i data-lucide="file-text" class="w-6 h-6 md:w-7 md:h-7"></i>
                                </div>
                                <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                                    <a href="${R2_PUBLIC_URL}/${encodeURIComponent(f.name)}" target="_blank" class="p-2 text-slate-400 hover:text-sky-500 transition-all">
                                        <i data-lucide="download" class="w-5 h-5"></i>
                                    </a>
                                    <button onclick="deleteFile('${doc.id}', '${f.name}')" class="p-2 text-slate-400 hover:text-red-500 transition-all">
                                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>
                            <h4 class="font-bold text-slate-700 text-base md:text-lg truncate mb-1" title="${f.name}">${f.name}</h4>
                            <div class="flex items-center justify-between mt-6 md:mt-8 pt-6 border-t border-slate-50">
                                <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest">${(f.size/(1024*1024)).toFixed(2)} MB</p>
                                <span class="text-[8px] font-black px-2 py-1 bg-slate-50 text-slate-400 rounded-md uppercase tracking-widest font-bold">Node R2</span>
                            </div>
                        </div>`;
                    });
                    grid.innerHTML = html;
                    lucide.createIcons();
                }

                const quotaPercent = (totalSize / storageLimit) * 100;
                document.getElementById('usage-bar').style.width = Math.min(quotaPercent, 100) + "%";
                document.getElementById('usage-percent').innerText = quotaPercent.toFixed(1) + "%";
                
                if(quotaPercent > 90) document.getElementById('usage-bar').classList.add('bg-red-500');
            });
        }

        function upgradePlan() {
            if(confirm("Upgrade ke Premium 20GB?")) {
                isPremium = true;
                loadFiles();
            }
        }

        loadFiles();
    </script>
</body>
</html>
