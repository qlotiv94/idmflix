<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDMFlix - Ultimate Cloud Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .dark-mode { background-color: #0f172a; color: #f8fafc; }
        .dark-mode aside, .dark-mode header, .dark-mode .bg-white { background-color: #1e293b !important; border-color: #334155 !important; color: #f8fafc; }
        .dark-mode .glass { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); }
        .dark-mode .text-slate-800, .dark-mode .text-slate-700 { color: #f1f5f9; }
        .dark-mode .bg-slate-50 { background-color: #0f172a; }
        
        .sidebar-item-active { background: #f0f9ff; color: #0ea5e9; border-right: 4px solid #0ea5e9; }
        .dark-mode .sidebar-item-active { background: #0ea5e920; color: #38bdf8; border-right: 4px solid #38bdf8; }
        
        .file-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .file-card:hover { transform: translateY(-5px); }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div class="lg:hidden bg-white border-b border-slate-100 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-sky-600 rounded-lg flex items-center justify-center">
                <i data-lucide="cloud-lightning" class="text-white w-5 h-5"></i>
            </div>
            <span class="text-xl font-extrabold tracking-tighter">IDMFlix</span>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="toggleDarkMode()" class="p-2 text-slate-500"><i data-lucide="moon" class="w-5 h-5"></i></button>
            <button onclick="toggleSidebar()" class="p-2 text-slate-500"><i data-lucide="menu" class="w-6 h-6"></i></button>
        </div>
    </div>

    <div class="flex min-h-screen">
        <aside id="sidebar" class="w-72 bg-white border-r border-slate-100 flex flex-col fixed h-full z-[60] -translate-x-full lg:translate-x-0 transition-transform duration-300">
            <div class="p-8 overflow-y-auto">
                <div class="flex justify-between items-center mb-8">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center shadow-lg shadow-sky-200">
                            <i data-lucide="cloud-lightning" class="text-white w-6 h-6"></i>
                        </div>
                        <span class="text-2xl font-extrabold tracking-tighter">IDMFlix</span>
                    </div>
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-400"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>

                <nav class="space-y-1">
                    <button onclick="setFilter('all')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl sidebar-item-active font-bold text-sm transition-all" id="nav-all">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
                    </button>
                    <button onclick="setFilter('starred')" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-50 font-semibold text-sm transition-all" id="nav-starred">
                        <i data-lucide="star" class="w-5 h-5"></i> Starred
                    </button>
                    <button onclick="toggleHistory()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-slate-400 hover:bg-slate-50 font-semibold text-sm transition-all">
                        <i data-lucide="history" class="w-5 h-5"></i> Activity Log
                    </button>

                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] mt-8 mb-4 px-4">Categories</p>
                    <button onclick="setFilter('image')" class="w-full flex items-center gap-3 px-4 py-2 rounded-xl text-slate-400 hover:bg-slate-50 font-semibold text-xs transition-all">
                        <i data-lucide="image" class="w-4 h-4"></i> Photos
                    </button>
                    <button onclick="setFilter('video')" class="w-full flex items-center gap-3 px-4 py-2 rounded-xl text-slate-400 hover:bg-slate-50 font-semibold text-xs transition-all">
                        <i data-lucide="video" class="w-4 h-4"></i> Videos
                    </button>
                    <button onclick="setFilter('app')" class="w-full flex items-center gap-3 px-4 py-2 rounded-xl text-slate-400 hover:bg-slate-50 font-semibold text-xs transition-all">
                        <i data-lucide="box" class="w-4 h-4"></i> Apps & Zips
                    </button>
                </nav>
            </div>

            <div class="mt-auto p-8 border-t border-slate-50">
                <div class="bg-slate-50 rounded-3xl p-5 border border-slate-100 mb-4">
                    <div class="flex justify-between items-center mb-2">
                        <span id="plan-badge" class="text-[9px] font-black px-2 py-0.5 bg-sky-100 text-sky-600 rounded-md uppercase tracking-wider">Free Access</span>
                        <span id="usage-percent" class="text-[10px] font-bold text-slate-400">0%</span>
                    </div>
                    <div class="h-1.5 bg-slate-200 rounded-full overflow-hidden mb-2">
                        <div id="usage-bar" class="h-full bg-sky-500 transition-all duration-1000 w-0%"></div>
                    </div>
                    <p id="quota-text" class="text-[10px] text-slate-400 font-bold text-center italic">Limit: 10GB</p>
                </div>
                <button onclick="upgradePlan()" class="w-full py-3 bg-slate-900 text-white dark:bg-sky-500 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95 transition-all">Upgrade Pro</button>
            </div>
        </aside>

        <main class="flex-1 lg:ml-72 min-h-screen p-6 lg:p-12 pb-32">
            <header class="hidden lg:flex justify-between items-center mb-12">
                <div class="relative w-96">
                    <i data-lucide="search" class="absolute left-4 top-3.5 text-slate-300 w-5 h-5"></i>
                    <input type="text" id="searchInput" placeholder="Search files..." onkeyup="handleSearch()" class="w-full pl-12 pr-4 py-3 bg-white border border-slate-100 rounded-2xl text-sm focus:outline-none focus:border-sky-300 shadow-sm">
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleDarkMode()" class="p-3 bg-white border border-slate-100 rounded-2xl text-slate-400 hover:text-sky-500 shadow-sm transition-all">
                        <i data-lucide="sun" id="dark-icon" class="w-5 h-5"></i>
                    </button>
                    <label class="bg-sky-600 hover:bg-sky-700 text-white px-8 py-3.5 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-xl shadow-sky-100 transition-all cursor-pointer flex items-center gap-2 active:scale-95">
                        <i data-lucide="plus" class="w-5 h-5"></i> New File
                        <input type="file" class="hidden" onchange="handleUpload(event)">
                    </label>
                </div>
            </header>

            <div class="flex justify-between items-end mb-8">
                <div>
                    <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight" id="view-title">Dashboard</h2>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Node: R2 Secure Bridge</p>
                </div>
                <div class="lg:hidden">
                    <label class="p-4 bg-sky-600 text-white rounded-2xl shadow-lg block active:scale-95"><i data-lucide="plus" class="w-6 h-6"></i><input type="file" class="hidden" onchange="handleUpload(event)"></label>
                </div>
            </div>

            <div id="files-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6"></div>
            <div id="empty-state" class="hidden py-32 text-center border-2 border-dashed border-slate-100 rounded-[3rem]">
                <i data-lucide="inbox" class="w-12 h-12 text-slate-200 mx-auto mb-4"></i>
                <p class="text-slate-400 font-bold uppercase text-[10px] tracking-widest">No files in this category</p>
            </div>
        </main>
    </div>

    <div id="history-panel" class="fixed right-0 top-0 h-full w-80 bg-white border-l border-slate-100 z-[70] translate-x-full transition-transform duration-300 p-8">
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-lg font-black text-slate-800">Activity Log</h3>
            <button onclick="toggleHistory()" class="p-2 text-slate-400 hover:text-red-500"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="history-content" class="space-y-6 overflow-y-auto h-[80vh]"></div>
    </div>

    <div id="upload-overlay" class="fixed bottom-6 right-6 left-6 lg:left-80 z-[100] translate-y-[200%] transition-all duration-700">
        <div class="max-w-3xl mx-auto glass p-6 rounded-[2.5rem] shadow-2xl border border-white/60">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-sky-500 text-white rounded-xl flex items-center justify-center"><i data-lucide="upload" class="w-6 h-6"></i></div>
                    <div class="max-w-[150px] md:max-w-xs"><h4 id="progress-filename" class="font-bold text-sm truncate">...</h4><p id="progress-stats" class="text-[10px] text-slate-400 font-mono">0 / 0 MB</p></div>
                </div>
                <div class="flex items-center gap-4">
                    <span id="progress-text" class="text-2xl font-black text-sky-500">0%</span>
                    <button id="cancel-btn" class="p-2 bg-red-50 text-red-500 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
            </div>
            <div class="w-full h-2 bg-slate-100 rounded-full overflow-hidden"><div id="progress-bar" class="h-full bg-sky-500 transition-all duration-300 w-0%"></div></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const R2_PUBLIC_URL = "https://pub-4f98c10dbf804eaa8153896aa25d7b6c.r2.dev";
        const WORKER_URL = "https://idmflix-bridge.qlotiv.workers.dev/upload";
        const firebaseConfig = {
            apiKey: "AIzaSyAhuQBL_NhWiKwsq_m3r0fOwY-kIMt2MpI",
            authDomain: "idmflixid.firebaseapp.com",
            projectId: "idmflixid",
            storageBucket: "idmflixid.firebasestorage.app",
            messagingSenderId: "305447137906",
            appId: "1:305447137906:web:3dcadf2a9ca348fb1ac8eb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allFiles = [], currentFilter = 'all', isPremium = false, currentXHR = null;

        lucide.createIcons();

        // 1. FILTERING & SEARCH
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('sidebar-item-active', 'font-bold'));
            document.getElementById(`nav-${filter === 'starred' ? 'starred' : 'all'}`).classList.add('sidebar-item-active');
            document.getElementById('view-title').innerText = filter.charAt(0).toUpperCase() + filter.slice(1);
            renderFiles();
        }

        function handleSearch() {
            renderFiles(document.getElementById('searchInput').value.toLowerCase());
        }

        // 2. CORE FUNCTIONS
        async function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const overlay = document.getElementById('upload-overlay');
            overlay.classList.remove('translate-y-[200%]');
            document.getElementById('progress-filename').innerText = file.name;

            currentXHR = new XMLHttpRequest();
            currentXHR.open("POST", WORKER_URL, true);
            currentXHR.setRequestHeader("X-File-Name", file.name);

            document.getElementById('cancel-btn').onclick = () => { if(currentXHR) currentXHR.abort(); overlay.classList.add('translate-y-[200%]'); };
            currentXHR.upload.onprogress = (ev) => {
                const percent = Math.round((ev.loaded / ev.total) * 100);
                document.getElementById('progress-bar').style.width = percent + "%";
                document.getElementById('progress-text').innerText = percent + "%";
                document.getElementById('progress-stats').innerText = `${(ev.loaded/(1024*1024)).toFixed(2)} / ${(ev.total/(1024*1024)).toFixed(2)} MB`;
            };

            currentXHR.onload = async () => {
                if(currentXHR.status === 200) {
                    await db.collection("files").add({
                        name: file.name, size: file.size, starred: false,
                        type: file.type || 'application/octet-stream',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    overlay.classList.add('translate-y-[200%]');
                }
            };
            currentXHR.send(file);
        }

        async function toggleStar(id, status) {
            await db.collection("files").doc(id).update({ starred: !status });
        }

        async function deleteFile(id, name) {
            if(confirm(`Delete ${name}?`)) {
                await db.collection("files").doc(id).delete();
                await fetch(WORKER_URL, { method: "DELETE", headers: { "X-File-Name": name } });
            }
        }

        function copyLink(name) {
            navigator.clipboard.writeText(`${R2_PUBLIC_URL}/${encodeURIComponent(name)}`);
            alert("Share Link Copied!");
        }

        // 3. UI RENDERING
        function renderFiles(searchQuery = '') {
            const grid = document.getElementById('files-grid');
            let filtered = allFiles.filter(f => {
                const matchesSearch = f.name.toLowerCase().includes(searchQuery);
                const type = f.name.split('.').pop().toLowerCase();
                if (currentFilter === 'starred') return f.starred && matchesSearch;
                if (currentFilter === 'image') return ['jpg','png','jpeg','gif','webp'].includes(type) && matchesSearch;
                if (currentFilter === 'video') return ['mp4','mkv','webm','mov'].includes(type) && matchesSearch;
                if (currentFilter === 'app') return ['apk','zip','rar','exe'].includes(type) && matchesSearch;
                return matchesSearch;
            });

            document.getElementById('empty-state').classList.toggle('hidden', filtered.length > 0);
            grid.innerHTML = filtered.map(f => `
                <div class="bg-white border border-slate-100 p-6 rounded-[2.5rem] file-card group">
                    <div class="flex justify-between mb-6">
                        <div class="w-12 h-12 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center group-hover:bg-sky-500 group-hover:text-white transition-all">
                            <i data-lucide="${getFileIcon(f.name)}" class="w-6 h-6"></i>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="toggleStar('${f.id}', ${f.starred})" class="p-2 ${f.starred ? 'text-amber-400' : 'text-slate-200'} hover:text-amber-400 transition-all"><i data-lucide="star" class="w-5 h-5 ${f.starred ? 'fill-amber-400' : ''}"></i></button>
                            <button onclick="copyLink('${f.name}')" class="p-2 text-slate-200 hover:text-sky-500 transition-all"><i data-lucide="share-2" class="w-5 h-5"></i></button>
                            <button onclick="deleteFile('${f.id}', '${f.name}')" class="p-2 text-slate-200 hover:text-red-500 transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                    <h4 class="font-bold text-slate-700 truncate mb-1" title="${f.name}">${f.name}</h4>
                    <div class="flex justify-between mt-6 pt-4 border-t border-slate-50">
                        <span class="text-[10px] font-black text-slate-300 uppercase tracking-widest">${(f.size/(1024*1024)).toFixed(2)} MB</span>
                        <a href="${R2_PUBLIC_URL}/${encodeURIComponent(f.name)}" target="_blank" class="text-[10px] font-black text-sky-500 uppercase tracking-widest hover:underline">Download</a>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function getFileIcon(n) {
            const ext = n.split('.').pop().toLowerCase();
            if(['jpg','png','jpeg','webp'].includes(ext)) return 'image';
            if(['mp4','mkv','webm'].includes(ext)) return 'video';
            if(['apk','zip','rar'].includes(ext)) return 'box';
            return 'file-text';
        }

        function toggleHistory() { document.getElementById('history-panel').classList.toggle('translate-x-full'); }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            document.getElementById('dark-icon').setAttribute('data-lucide', isDark ? 'moon' : 'sun');
            lucide.createIcons();
        }

        function loadData() {
            db.collection("files").orderBy("timestamp", "desc").onSnapshot(snap => {
                allFiles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderFiles();
                
                // Update History & Quota
                const history = document.getElementById('history-content');
                history.innerHTML = allFiles.slice(0,10).map(f => `
                    <div class="flex gap-4 items-start">
                        <div class="w-2 h-2 rounded-full bg-sky-500 mt-2"></div>
                        <div><p class="text-xs font-bold text-slate-700 truncate w-48">${f.name}</p><p class="text-[10px] text-slate-400">Uploaded just now</p></div>
                    </div>
                `).join('');

                const totalSize = allFiles.reduce((acc, f) => acc + (f.size || 0), 0);
                const limit = (isPremium ? 20 : 10) * 1024 * 1024 * 1024;
                const pct = (totalSize / limit) * 100;
                document.getElementById('usage-bar').style.width = Math.min(pct, 100) + "%";
                document.getElementById('usage-percent').innerText = pct.toFixed(1) + "%";
            });
        }

        function upgradePlan() { if(confirm("Upgrade Premium 20GB?")) { isPremium = true; loadData(); } }

        loadData();
    </script>
</body>
</html>
