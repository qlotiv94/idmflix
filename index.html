<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDMFlix - Cloud Mesh Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .baby-blue-bg { background-color: #f0f9ff; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e0f2fe; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="baby-blue-bg min-h-screen text-slate-900">

    <div id="app" class="flex min-h-screen">
        <aside class="w-80 bg-white border-r border-sky-100 p-10 hidden lg:flex flex-col fixed h-full z-50">
            <div class="flex items-center gap-3 mb-16">
                <div class="w-12 h-12 bg-sky-600 rounded-2xl flex items-center justify-center shadow-xl shadow-sky-200">
                    <i data-lucide="zap" class="text-white fill-white w-7 h-7"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tighter text-sky-950">IDMFlix</h1>
            </div>

            <nav class="space-y-4 flex-1">
                <p class="text-[10px] font-black text-sky-300 uppercase tracking-[0.2em] mb-4">Cloud Navigation</p>
                <div class="w-full flex items-center gap-4 px-6 py-4 bg-sky-50 text-sky-600 rounded-[1.5rem] font-bold text-sm cursor-default">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
                </div>
            </nav>

            <div class="mt-auto bg-sky-50 p-6 rounded-[2rem] border border-sky-100">
                <div class="flex justify-between text-[10px] font-black text-sky-400 uppercase mb-3">
                    <span>Quota (20GB)</span>
                    <span id="usage-percent">0%</span>
                </div>
                <div class="h-1.5 bg-white rounded-full overflow-hidden">
                    <div id="usage-bar" class="h-full bg-sky-500 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </aside>

        <main class="flex-1 lg:ml-80 p-8 lg:p-16">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-20">
                <div>
                    <h2 class="text-5xl font-black text-sky-950 tracking-tighter">Multi-Cloud</h2>
                    <p class="text-sky-400 font-medium text-lg mt-2">Status Node: <span class="text-sky-600 font-bold underline decoration-sky-200">R2 & Firebase Active</span></p>
                </div>
                <label class="bg-sky-600 hover:bg-sky-700 text-white px-10 py-5 rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] shadow-2xl shadow-sky-200 transition-all cursor-pointer flex items-center gap-3 active:scale-95">
                    <i data-lucide="upload-cloud" class="w-6 h-6"></i> Unggah File
                    <input type="file" class="hidden" id="mainUpload" onchange="uploadSim(event)">
                </label>
            </header>

            <div id="files-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8">
                <div id="empty-state" class="col-span-full py-40 text-center glass-card rounded-[4rem] border-2 border-dashed border-sky-100">
                    <i data-lucide="folder-open" class="w-12 h-12 text-sky-200 mx-auto mb-8"></i>
                    <h3 class="text-3xl font-black text-sky-950">Mulai Unggah</h3>
                    <p class="text-sky-400 mt-4 font-medium text-lg">File akan tersimpan permanen di cloud anda.</p>
                </div>
            </div>
        </main>
    </div>

    <div id="notif" class="fixed bottom-12 right-12 bg-sky-950 text-white px-8 py-5 rounded-[2rem] shadow-2xl flex items-center gap-4 transition-all translate-y-40 z-[100]">
        <span id="notif-msg" class="font-bold text-sm">Pesan sistem...</span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // --- KONFIGURASI ---
        const R2_PUBLIC_URL = "https://pub-4f98c10dbf804eaa8153896aa25d7b6c.r2.dev";
        const WORKER_URL = "https://idmflix-bridge.qlovtiv.workers.dev/upload";
        
        const firebaseConfig = {
            apiKey: "AIzaSyAhuQBL_NhWiKwsq_m3r0fOwY-kIMt2MpI",
            authDomain: "idmflixid.firebaseapp.com",
            projectId: "idmflixid",
            storageBucket: "idmflixid.firebasestorage.app",
            messagingSenderId: "305447137906",
            appId: "1:305447137906:web:3dcadf2a9ca348fb1ac8eb"
        };

        // Init Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storageLimit = 20 * 1024 * 1024 * 1024; // 20GB

        lucide.createIcons();

        // 1. Ambil Data Real-time dari Firebase
        function loadFiles() {
            db.collection("files").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
                const files = [];
                let totalUsed = 0;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    files.push({ id: doc.id, ...data });
                    totalUsed += data.size || 0;
                });
                render(files, totalUsed);
            }, (err) => {
                console.error(err);
                showNotif("Gagal sinkron database!");
            });
        }

        // 2. Fungsi Upload Utama
        async function uploadSim(e) {
            const file = e.target.files[0];
            if(!file) return;

            showNotif("Mengunggah ke Cloud R2...");

            try {
                // Upload fisik ke Cloudflare via Worker
                const response = await fetch(WORKER_URL, {
                    method: "POST",
                    headers: { "X-File-Name": file.name },
                    body: file
                });

                if (!response.ok) throw new Error("Worker menolak unggahan");

                // Simpan metadata ke Firestore jika upload fisik berhasil
                await db.collection("files").add({
                    name: file.name,
                    size: file.size,
                    provider: 'R2',
                    date: new Date().toLocaleDateString('id-ID'),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                showNotif("Berhasil Unggah!");
            } catch (err) {
                console.error(err);
                showNotif("Gagal: " + err.message);
            }
            e.target.value = ''; // Reset input
        }

        // 3. Fungsi Hapus
        async function deleteFile(id) {
            if(confirm("Hapus catatan file ini?")) {
                try {
                    await db.collection("files").doc(id).delete();
                    showNotif("Data dihapus!");
                } catch (err) {
                    showNotif("Gagal menghapus!");
                }
            }
        }

        // 4. Render Tampilan
        function render(files, totalUsed) {
            const grid = document.getElementById('files-grid');
            const empty = document.getElementById('empty-state');
            
            if(files.length > 0) {
                empty.classList.add('hidden');
                grid.innerHTML = files.map(f => `
                    <div class="glass-card p-8 rounded-[3rem] animate-fade group transition-all hover:border-sky-300">
                        <div class="flex justify-between items-start mb-10">
                            <div class="p-5 bg-sky-50 text-sky-600 rounded-2xl group-hover:bg-sky-600 group-hover:text-white transition-all">
                                <i data-lucide="file-text" class="w-8 h-8"></i>
                            </div>
                            <div class="flex gap-2">
                                <a href="${R2_PUBLIC_URL}/${encodeURIComponent(f.name)}" target="_blank" class="p-2 text-sky-400 hover:text-sky-600 transition-colors">
                                    <i data-lucide="download" class="w-6 h-6"></i>
                                </a>
                                <button onclick="deleteFile('${f.id}')" class="text-sky-200 hover:text-red-500 p-2 transition-colors">
                                    <i data-lucide="trash-2" class="w-6 h-6"></i>
                                </button>
                            </div>
                        </div>
                        <h4 class="font-bold text-xl text-sky-950 truncate" title="${f.name}">${f.name}</h4>
                        <div class="flex items-center justify-between mt-10 pt-6 border-t border-sky-50">
                            <span class="text-[10px] font-black text-sky-400 uppercase tracking-widest">${(f.size/1024).toFixed(1)} KB</span>
                            <span class="text-[9px] font-black px-3 py-1 bg-sky-50 text-sky-500 rounded-full uppercase tracking-widest">Node: ${f.provider}</span>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            } else {
                empty.classList.remove('hidden');
                grid.innerHTML = '';
            }
            
            const percent = (totalUsed / storageLimit) * 100;
            document.getElementById('usage-bar').style.width = Math.min(percent, 100) + '%';
            document.getElementById('usage-percent').innerText = percent.toFixed(2) + '%';
        }

        function showNotif(msg) {
            const n = document.getElementById('notif');
            document.getElementById('notif-msg').innerText = msg;
            n.classList.remove('translate-y-40');
            setTimeout(() => n.classList.add('translate-y-40'), 3000);
        }

        // Jalankan
        loadFiles();
    </script>
</body>
</html>
