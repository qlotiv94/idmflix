<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDMFlix - Professional Cloud Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .btn-premium { background: linear-gradient(135deg, #f59e0b 0%, #ea580c 100%); transition: all 0.3s ease; }
        .file-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-pop { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">

    <nav class="bg-white border-b border-slate-100 sticky top-0 z-[60] px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center shadow-lg shadow-sky-100">
                    <i data-lucide="cloud-lightning" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-2xl font-black tracking-tighter text-slate-800 hidden md:block">IDMFlix</span>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="plan-label" class="text-[10px] font-black text-sky-500 uppercase tracking-widest">Free Access</p>
                    <div class="w-32 h-1.5 bg-slate-100 rounded-full mt-1 overflow-hidden">
                        <div id="usage-bar-top" class="h-full bg-sky-500 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
                <button onclick="upgradePlan()" class="btn-premium text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-lg shadow-orange-100 active:scale-95">
                    Upgrade Pro
                </button>
                <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-slate-50 rounded-xl text-slate-500">
                    <i data-lucide="menu" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="flex min-h-screen">
        <aside id="sidebar" class="w-72 bg-white border-r border-slate-100 flex flex-col fixed h-full z-[70] -translate-x-full lg:translate-x-0 transition-transform duration-300">
            <div class="p-8">
                <div class="flex justify-between items-center mb-10">
                    <span class="text-2xl font-black tracking-tighter">Menu</span>
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 text-slate-400"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <nav class="space-y-2">
                    <button onclick="showDashboard()" class="w-full flex items-center gap-3 px-4 py-3 bg-sky-50 text-sky-600 rounded-xl font-bold text-sm">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
                    </button>
                    <button class="w-full flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-50 rounded-xl font-bold text-sm">
                        <i data-lucide="star" class="w-5 h-5"></i> Favorit
                    </button>
                </nav>
            </div>
        </aside>

        <main class="flex-1 lg:ml-72 p-6 lg:p-12 pb-32">
            <div id="dashboard-view">
                <div class="flex justify-between items-end mb-10">
                    <div>
                        <h2 class="text-3xl font-extrabold text-slate-800 tracking-tight">Cloud Explorer</h2>
                        <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mt-1">Status: R2 Secure Node</p>
                    </div>
                    <label class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold text-xs uppercase tracking-widest cursor-pointer active:scale-95 transition-all">
                        <i data-lucide="plus" class="inline w-4 h-4 mr-2"></i> New File
                        <input type="file" class="hidden" onchange="handleUpload(event)">
                    </label>
                </div>

                <div id="files-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
            </div>

            <div id="download-view" class="hidden max-w-2xl mx-auto py-12 animate-pop">
                <button onclick="showDashboard()" class="mb-8 text-slate-400 hover:text-sky-500 flex items-center gap-2 font-bold text-sm transition-all">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i> Kembali ke Dashboard
                </button>
                
                <div class="bg-white border border-slate-100 rounded-[3rem] p-10 shadow-2xl shadow-slate-200 text-center relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-sky-500"></div>
                    
                    <div class="w-24 h-24 bg-sky-50 text-sky-600 rounded-[2rem] flex items-center justify-center mx-auto mb-8">
                        <i data-lucide="file-text" class="w-12 h-12"></i>
                    </div>
                    
                    <h1 id="dl-name" class="text-2xl font-black text-slate-800 mb-2 truncate">Nama File Kamu.apk</h1>
                    <p id="dl-size" class="text-slate-400 font-bold mb-10">Ukuran: 0.00 MB</p>
                    
                    <a id="dl-link" href="#" target="_blank" class="w-full bg-sky-600 hover:bg-sky-700 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-[0.2em] shadow-xl shadow-sky-100 flex items-center justify-center gap-3 transition-all active:scale-95">
                        <i data-lucide="download-cloud" class="w-6 h-6"></i> Download Now
                    </a>
                    
                    <div class="grid grid-cols-2 gap-4 mt-8">
                        <div class="bg-slate-50 p-4 rounded-2xl text-center border border-slate-100">
                            <p class="text-[10px] font-black text-slate-300 uppercase">Type</p>
                            <p id="dl-type" class="text-xs font-bold text-slate-600 mt-1">Application</p>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl text-center border border-slate-100">
                            <p class="text-[10px] font-black text-slate-300 uppercase">Provider</p>
                            <p class="text-xs font-bold text-slate-600 mt-1 uppercase">Cloudflare R2</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="upload-overlay" class="fixed bottom-6 right-6 left-6 lg:left-80 z-[100] translate-y-[200%] transition-all duration-700">
        <div class="max-w-3xl mx-auto glass p-6 md:p-8 rounded-[2.5rem] shadow-2xl border border-white/60">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-sky-500 text-white rounded-xl flex items-center justify-center"><i data-lucide="upload" class="w-6 h-6"></i></div>
                    <div class="max-w-[150px] md:max-w-xs"><h4 id="progress-filename" class="font-bold text-sm truncate">...</h4><p id="progress-stats" class="text-[10px] text-slate-400 font-mono">0 / 0 MB</p></div>
                </div>
                <div class="flex items-center gap-4">
                    <span id="progress-text" class="text-2xl font-black text-sky-500 italic">0%</span>
                    <button id="cancel-btn" class="p-2 bg-red-50 text-red-500 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
            </div>
            <div class="w-full h-2.5 bg-slate-100 rounded-full overflow-hidden"><div id="progress-bar" class="h-full bg-sky-500 transition-all duration-300 w-0%"></div></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const R2_PUBLIC_URL = "https://pub-4f98c10dbf804eaa8153896aa25d7b6c.r2.dev";
        const WORKER_URL = "https://idmflix-bridge.qlotiv.workers.dev/upload";
        const firebaseConfig = {
            apiKey: "AIzaSyAhuQBL_NhWiKwsq_m3r0fOwY-kIMt2MpI",
            authDomain: "idmflixid.firebaseapp.com",
            projectId: "idmflixid",
            storageBucket: "idmflixid.firebasestorage.app",
            messagingSenderId: "305447137906",
            appId: "1:305447137906:web:3dcadf2a9ca348fb1ac8eb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let isPremium = false, currentXHR = null;

        lucide.createIcons();

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }

        function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const overlay = document.getElementById('upload-overlay');
            overlay.classList.remove('translate-y-[200%]');
            document.getElementById('progress-filename').innerText = file.name;

            currentXHR = new XMLHttpRequest();
            currentXHR.open("POST", WORKER_URL, true);
            currentXHR.setRequestHeader("X-File-Name", file.name);

            document.getElementById('cancel-btn').onclick = () => { if(currentXHR) currentXHR.abort(); overlay.classList.add('translate-y-[200%]'); };
            currentXHR.upload.onprogress = (ev) => {
                const percent = Math.round((ev.loaded / ev.total) * 100);
                document.getElementById('progress-bar').style.width = percent + "%";
                document.getElementById('progress-text').innerText = percent + "%";
                document.getElementById('progress-stats').innerText = `${(ev.loaded/(1024*1024)).toFixed(2)} / ${(ev.total/(1024*1024)).toFixed(2)} MB`;
            };

            currentXHR.onload = async () => {
                if(currentXHR.status === 200) {
                    await db.collection("files").add({
                        name: file.name, size: file.size,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    overlay.classList.add('translate-y-[200%]');
                    alert("Berhasil!");
                }
            };
            currentXHR.send(file);
        }

        // FUNGSI TAMPILAN DOWNLOAD (GAYA MEDIAFIRE)
        function openDownload(name, size) {
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('download-view').classList.remove('hidden');
            document.getElementById('dl-name').innerText = name;
            document.getElementById('dl-size').innerText = `Ukuran: ${(size/(1024*1024)).toFixed(2)} MB`;
            document.getElementById('dl-link').href = `${R2_PUBLIC_URL}/${encodeURIComponent(name)}`;
            document.getElementById('dl-type').innerText = name.split('.').pop().toUpperCase();
            window.scrollTo(0, 0);
        }

        function showDashboard() {
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('download-view').classList.add('hidden');
        }

        async function deleteFile(id, name) {
            if(confirm(`Hapus ${name}?`)) {
                await db.collection("files").doc(id).delete();
                await fetch(WORKER_URL, { method: "DELETE", headers: { "X-File-Name": name } });
            }
        }

        function loadFiles() {
            db.collection("files").orderBy("timestamp", "desc").onSnapshot(snap => {
                const grid = document.getElementById('files-grid');
                let html = '', totalSize = 0;
                
                snap.forEach(doc => {
                    const f = doc.data();
                    totalSize += f.size || 0;
                    html += `
                    <div class="bg-white border border-slate-100 p-8 rounded-[2.5rem] file-card transition-all group cursor-pointer" onclick="openDownload('${f.name}', ${f.size})">
                        <div class="flex justify-between items-start mb-8">
                            <div class="w-14 h-14 bg-slate-50 text-slate-400 rounded-2xl flex items-center justify-center group-hover:bg-sky-500 group-hover:text-white transition-all">
                                <i data-lucide="file-text" class="w-7 h-7"></i>
                            </div>
                            <button onclick="event.stopPropagation(); deleteFile('${doc.id}', '${f.name}')" class="p-2 text-slate-200 hover:text-red-500 transition-all">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </button>
                        </div>
                        <h4 class="font-bold text-slate-700 text-lg truncate mb-1">${f.name}</h4>
                        <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest">${(f.size/(1024*1024)).toFixed(2)} MB</p>
                    </div>`;
                });
                grid.innerHTML = html;
                lucide.createIcons();

                // UPDATE QUOTA ATAS
                const limit = (isPremium ? 20 : 10) * 1024 * 1024 * 1024;
                const pct = (totalSize / limit) * 100;
                document.getElementById('usage-bar-top').style.width = Math.min(pct, 100) + "%";
                document.getElementById('quota-text').innerText = `Limit: ${(limit/(1024*1024*1024)).toFixed(0)}GB Store`;
            });
        }

        function upgradePlan() {
            if(confirm("Upgrade ke Premium 20GB?")) {
                isPremium = true;
                document.getElementById('plan-label').innerText = "Premium Plan";
                document.getElementById('plan-label').classList.replace('text-sky-500', 'text-amber-500');
                loadFiles();
            }
        }

        loadFiles();
    </script>
</body>
</html>
