<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDMFlix - Cloud Mesh Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .baby-blue-bg { background-color: #f0f9ff; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e0f2fe; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="baby-blue-bg min-h-screen text-slate-900">

    <div id="app" class="flex min-h-screen">
        <aside class="w-80 bg-white border-r border-sky-100 p-10 hidden lg:flex flex-col fixed h-full z-50">
            <div class="flex items-center gap-3 mb-16">
                <div class="w-12 h-12 bg-sky-600 rounded-2xl flex items-center justify-center shadow-xl shadow-sky-200">
                    <i data-lucide="zap" class="text-white fill-white w-7 h-7"></i>
                </div>
                <h1 class="text-3xl font-black tracking-tighter text-sky-950">IDMFlix</h1>
            </div>
            <nav class="space-y-4 flex-1">
                <div class="w-full flex items-center gap-4 px-6 py-4 bg-sky-50 text-sky-600 rounded-[1.5rem] font-bold text-sm">
                    <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
                </div>
            </nav>
            <div class="mt-auto bg-sky-50 p-6 rounded-[2rem] border border-sky-100">
                <div class="flex justify-between text-[10px] font-black text-sky-400 uppercase mb-3">
                    <span>Quota (20GB)</span>
                    <span id="usage-percent">0%</span>
                </div>
                <div class="h-1.5 bg-white rounded-full overflow-hidden">
                    <div id="usage-bar" class="h-full bg-sky-500 transition-all duration-1000" style="width: 0%"></div>
                </div>
            </div>
        </aside>

        <main class="flex-1 lg:ml-80 p-8 lg:p-16 pb-40">
            <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-8 mb-20">
                <div>
                    <h2 class="text-5xl font-black text-sky-950 tracking-tighter">Multi-Cloud</h2>
                    <p class="text-sky-400 font-medium text-lg mt-2 uppercase text-xs font-bold tracking-widest">Node: R2 & Firebase Active</p>
                </div>
                <label class="bg-sky-600 hover:bg-sky-700 text-white px-10 py-5 rounded-[2rem] font-black text-xs uppercase tracking-[0.2em] shadow-2xl shadow-sky-200 transition-all cursor-pointer flex items-center gap-3 active:scale-95">
                    <i data-lucide="upload-cloud" class="w-6 h-6"></i> Unggah File
                    <input type="file" class="hidden" id="mainUpload" onchange="handleUpload(event)">
                </label>
            </header>

            <div id="files-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
        </main>
    </div>

    <div id="upload-overlay" class="fixed inset-x-0 bottom-0 p-6 z-[100] translate-y-full transition-transform duration-500 ease-in-out">
        <div class="max-w-xl mx-auto bg-white rounded-[2.5rem] shadow-[0_-20px_60px_-15px_rgba(0,0,0,0.1)] p-8 border border-sky-50">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-sky-100 text-sky-600 rounded-2xl flex items-center justify-center animate-pulse">
                        <i data-lucide="file-up" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h4 id="progress-filename" class="font-bold text-slate-800 truncate w-32 md:w-48">File...</h4>
                        <p id="progress-stats" class="text-xs text-slate-400 font-medium font-mono">0 / 0 MB</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <span id="progress-text" class="text-2xl font-black text-sky-600 italic">0%</span>
                    <button id="cancel-btn" class="px-4 py-2 border-2 border-slate-100 hover:bg-red-50 hover:border-red-100 hover:text-red-500 text-slate-400 rounded-xl text-[10px] font-black uppercase transition-all">CANCEL</button>
                </div>
            </div>
            <div class="w-full h-3 bg-sky-50 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-sky-500 shadow-[0_0_15px_rgba(14,165,233,0.5)] transition-all duration-300 w-0%"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const R2_PUBLIC_URL = "https://pub-4f98c10dbf804eaa8153896aa25d7b6c.r2.dev";
        const WORKER_URL = "https://idmflix-bridge.qlotiv.workers.dev/upload";
        const firebaseConfig = {
            apiKey: "AIzaSyAhuQBL_NhWiKwsq_m3r0fOwY-kIMt2MpI",
            authDomain: "idmflixid.firebaseapp.com",
            projectId: "idmflixid",
            storageBucket: "idmflixid.firebasestorage.app",
            messagingSenderId: "305447137906",
            appId: "1:305447137906:web:3dcadf2a9ca348fb1ac8eb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let currentXHR = null; // Untuk menyimpan proses upload yang sedang jalan

        // FUNGSI UPLOAD DENGAN CANCEL
        function handleUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const overlay = document.getElementById('upload-overlay');
            const bar = document.getElementById('progress-bar');
            const text = document.getElementById('progress-text');
            const stats = document.getElementById('progress-stats');
            const fname = document.getElementById('progress-filename');
            const cancelBtn = document.getElementById('cancel-btn');

            fname.innerText = file.name;
            overlay.classList.remove('translate-y-full');
            
            currentXHR = new XMLHttpRequest();
            currentXHR.open("POST", WORKER_URL, true);
            currentXHR.setRequestHeader("X-File-Name", file.name);

            cancelBtn.onclick = () => {
                if(currentXHR) {
                    currentXHR.abort();
                    overlay.classList.add('translate-y-full');
                    alert("Upload dibatalkan!");
                }
            };

            currentXHR.upload.onprogress = (e) => {
                if (e.lengthComputable) {
                    const percent = Math.round((e.loaded / e.total) * 100);
                    bar.style.width = percent + "%";
                    text.innerText = percent + "%";
                    stats.innerText = `${(e.loaded/(1024*1024)).toFixed(2)} MB / ${(e.total/(1024*1024)).toFixed(2)} MB`;
                }
            };

            currentXHR.onload = async () => {
                if (currentXHR.status === 200) {
                    await db.collection("files").add({
                        name: file.name,
                        size: file.size,
                        provider: 'R2',
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    setTimeout(() => overlay.classList.add('translate-y-full'), 1000);
                }
            };

            currentXHR.send(file);
            event.target.value = '';
        }

        // FUNGSI HAPUS FILE
        async function deleteFile(id, fileName) {
            if (confirm(`Hapus file "${fileName}"?`)) {
                try {
                    // Hapus dari Firestore
                    await db.collection("files").doc(id).delete();
                    
                    // Request ke Worker untuk hapus dari R2
                    await fetch(WORKER_URL, {
                        method: "DELETE",
                        headers: { "X-File-Name": fileName }
                    });
                    
                    alert("File berhasil dihapus!");
                } catch (err) {
                    alert("Gagal menghapus file!");
                }
            }
        }

        function loadFiles() {
            db.collection("files").orderBy("timestamp", "desc").onSnapshot(snapshot => {
                const grid = document.getElementById('files-grid');
                let html = '';
                let totalSize = 0;
                
                snapshot.forEach(doc => {
                    const f = doc.data();
                    const id = doc.id;
                    totalSize += f.size || 0;
                    html += `
                        <div class="glass-card p-8 rounded-[3rem] animate-fade group transition-all hover:border-sky-300">
                            <div class="flex justify-between items-start mb-10">
                                <div class="p-5 bg-sky-50 text-sky-600 rounded-2xl group-hover:bg-sky-600 group-hover:text-white transition-all">
                                    <i data-lucide="file"></i>
                                </div>
                                <div class="flex gap-1">
                                    <a href="${R2_PUBLIC_URL}/${encodeURIComponent(f.name)}" target="_blank" class="p-3 text-sky-400 hover:text-sky-600">
                                        <i data-lucide="external-link" class="w-5 h-5"></i>
                                    </a>
                                    <button onclick="deleteFile('${id}', '${f.name}')" class="p-3 text-slate-200 hover:text-red-500 transition-colors">
                                        <i data-lucide="trash-2" class="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>
                            <h4 class="font-bold text-lg text-sky-950 truncate">${f.name}</h4>
                            <div class="flex items-center justify-between mt-8 pt-6 border-t border-sky-50">
                                <span class="text-[10px] font-black text-sky-300 uppercase">${(f.size/(1024*1024)).toFixed(2)} MB</span>
                                <span class="text-[9px] font-black px-3 py-1 bg-sky-50 text-sky-500 rounded-full uppercase">${f.provider}</span>
                            </div>
                        </div>`;
                });
                grid.innerHTML = html || '<div class="col-span-full text-center py-20 text-sky-300 font-bold">Belum ada file</div>';
                lucide.createIcons();
                
                const percent = (totalSize / (20 * 1024 * 1024 * 1024)) * 100;
                document.getElementById('usage-bar').style.width = percent + "%";
                document.getElementById('usage-percent').innerText = percent.toFixed(2) + "%";
            });
        }

        loadFiles();
    </script>
</body>
</html>
