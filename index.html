<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDMFlix - Ultimate Cloud SaaS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .sidebar-active { background: #f0f9ff; color: #0ea5e9; border-right: 4px solid #0ea5e9; }
        .file-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.05); }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .animate-slide { animation: slideIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="bg-white border-b border-slate-100 sticky top-0 z-[60] px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-sky-600 rounded-xl flex items-center justify-center shadow-lg shadow-sky-100">
                    <i data-lucide="cloud-lightning" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-2xl font-black tracking-tighter text-slate-800 hidden md:block">IDMFlix</span>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p id="plan-label" class="text-[9px] font-black text-sky-500 uppercase tracking-widest">Free Access</p>
                    <div class="w-32 h-1.5 bg-slate-100 rounded-full mt-1 overflow-hidden">
                        <div id="usage-bar-top" class="h-full bg-sky-500 transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>
                <button onclick="upgradePlan()" class="bg-gradient-to-r from-amber-400 to-orange-500 text-white px-5 py-2.5 rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-lg shadow-orange-100 active:scale-95">
                    Upgrade Pro
                </button>
                <button onclick="toggleSidebar()" class="lg:hidden p-2 bg-slate-50 rounded-xl text-slate-500"><i data-lucide="menu" class="w-6 h-6"></i></button>
            </div>
        </div>
    </nav>

    <div class="flex min-h-screen">
        <aside id="sidebar" class="w-72 bg-white border-r border-slate-100 flex flex-col fixed h-full z-[70] -translate-x-full lg:translate-x-0 transition-transform duration-300">
            <div class="p-8 overflow-y-auto h-full pb-32">
                <div class="flex justify-between items-center mb-8">
                    <span class="text-xl font-black tracking-tighter uppercase text-slate-400">Main Menu</span>
                    <button onclick="toggleSidebar()" class="lg:hidden p-2"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                
                <nav class="space-y-1 mb-10">
                    <button onclick="setFilter('all')" id="nav-all" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl sidebar-active font-bold text-sm">
                        <i data-lucide="layout-grid" class="w-5 h-5"></i> Dashboard
                    </button>
                    <button onclick="toggleHistory()" class="w-full flex items-center gap-3 px-4 py-3 text-slate-400 hover:bg-slate-50 rounded-xl font-bold text-sm">
                        <i data-lucide="history" class="w-5 h-5"></i> Activity Log
                    </button>
                </nav>

                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 px-4">Categories</p>
                <div class="space-y-1">
                    <button onclick="setFilter('image')" class="w-full flex items-center gap-3 px-4 py-2 text-slate-500 hover:bg-slate-50 rounded-lg text-xs font-bold transition-all">
                        <i data-lucide="image" class="w-4 h-4"></i> Photos
                    </button>
                    <button onclick="setFilter('video')" class="w-full flex items-center gap-3 px-4 py-2 text-slate-500 hover:bg-slate-50 rounded-lg text-xs font-bold transition-all">
                        <i data-lucide="video" class="w-4 h-4"></i> Videos
                    </button>
                    <button onclick="setFilter('app')" class="w-full flex items-center gap-3 px-4 py-2 text-slate-500 hover:bg-slate-50 rounded-lg text-xs font-bold transition-all">
                        <i data-lucide="box" class="w-4 h-4"></i> Apps & Zips
                    </button>
                </div>
            </div>
        </aside>

        <main class="flex-1 lg:ml-72 p-6 lg:p-12">
            <div id="dashboard-view">
                <div class="flex justify-between items-center mb-10">
                    <div>
                        <h2 class="text-3xl font-extrabold text-slate-800" id="view-title">Dashboard</h2>
                        <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Secure Cloud R2</p>
                    </div>
                    <label class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold text-xs uppercase cursor-pointer active:scale-95 transition-all">
                        + New File <input type="file" class="hidden" onchange="handleUpload(event)">
                    </label>
                </div>
                <div id="files-grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
            </div>

            <div id="download-view" class="hidden max-w-2xl mx-auto py-12">
                <button onclick="showDashboard()" class="mb-6 text-slate-400 hover:text-sky-500 flex items-center gap-2 font-bold text-xs">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> BACK TO DASHBOARD
                </button>
                <div class="bg-white border border-slate-100 rounded-[3rem] p-10 shadow-2xl text-center relative overflow-hidden">
                    <div class="absolute top-0 left-0 w-full h-2 bg-sky-500"></div>
                    <div class="w-20 h-20 bg-sky-50 text-sky-600 rounded-3xl flex items-center justify-center mx-auto mb-6">
                        <i data-lucide="file-text" class="w-10 h-10"></i>
                    </div>
                    <h1 id="dl-name" class="text-xl font-black text-slate-800 mb-2 truncate px-4">Filename.apk</h1>
                    <p id="dl-size" class="text-slate-400 font-bold mb-10 text-sm">0.00 MB</p>
                    <a id="dl-link" href="#" target="_blank" class="w-full bg-sky-600 text-white py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-xl flex items-center justify-center gap-3 active:scale-95">
                        <i data-lucide="download" class="w-5 h-5"></i> DOWNLOAD NOW
                    </a>
                </div>
            </div>
        </main>
    </div>

    <div id="history-panel" class="fixed right-0 top-0 h-full w-80 bg-white border-l border-slate-100 z-[80] translate-x-full transition-transform duration-300 p-8">
        <div class="flex justify-between items-center mb-8">
            <h3 class="font-black text-lg">Activity Log</h3>
            <button onclick="toggleHistory()"><i data-lucide="x" class="w-6 h-6"></i></button>
        </div>
        <div id="history-content" class="space-y-4"></div>
    </div>

    <div id="upload-overlay" class="fixed bottom-6 right-6 left-6 lg:left-80 z-[100] translate-y-[200%] transition-all duration-700">
        <div class="max-w-3xl mx-auto glass p-6 rounded-[2rem] shadow-2xl border border-white">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-sky-500 text-white rounded-lg flex items-center justify-center"><i data-lucide="arrow-up" class="w-5 h-5"></i></div>
                    <div><h4 id="progress-filename" class="font-bold text-xs truncate w-32 md:w-64">...</h4><p id="progress-stats" class="text-[9px] text-slate-400 font-mono uppercase">0 / 0 MB</p></div>
                </div>
                <div class="flex items-center gap-4">
                    <span id="progress-text" class="text-xl font-black text-sky-500">0%</span>
                    <button id="cancel-btn" class="p-2 bg-red-50 text-red-500 rounded-lg"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
            </div>
            <div class="w-full h-1.5 bg-slate-100 rounded-full overflow-hidden"><div id="progress-bar" class="h-full bg-sky-500 w-0%"></div></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const R2_PUBLIC_URL = "https://pub-4f98c10dbf804eaa8153896aa25d7b6c.r2.dev";
        const WORKER_URL = "https://idmflix-bridge.qlotiv.workers.dev/upload";
        const firebaseConfig = {
            apiKey: "AIzaSyAhuQBL_NhWiKwsq_m3r0fOwY-kIMt2MpI",
            authDomain: "idmflixid.firebaseapp.com",
            projectId: "idmflixid",
            storageBucket: "idmflixid.firebasestorage.app",
            messagingSenderId: "305447137906",
            appId: "1:305447137906:web:3dcadf2a9ca348fb1ac8eb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let allFiles = [], currentFilter = 'all', isPremium = false, currentXHR = null;

        lucide.createIcons();

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('-translate-x-full'); }
        function toggleHistory() { document.getElementById('history-panel').classList.toggle('translate-x-full'); }

        function setFilter(f) {
            currentFilter = f;
            document.getElementById('view-title').innerText = f === 'all' ? 'Dashboard' : f.toUpperCase();
            renderFiles();
            if(window.innerWidth < 1024) toggleSidebar();
        }

        async function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const overlay = document.getElementById('upload-overlay');
            overlay.classList.remove('translate-y-[200%]');
            document.getElementById('progress-filename').innerText = file.name;

            currentXHR = new XMLHttpRequest();
            currentXHR.open("POST", WORKER_URL, true);
            currentXHR.setRequestHeader("X-File-Name", file.name);

            currentXHR.upload.onprogress = (ev) => {
                const percent = Math.round((ev.loaded / ev.total) * 100);
                document.getElementById('progress-bar').style.width = percent + "%";
                document.getElementById('progress-text').innerText = percent + "%";
                document.getElementById('progress-stats').innerText = `${(ev.loaded/(1024*1024)).toFixed(2)} / ${(ev.total/(1024*1024)).toFixed(2)} MB`;
            };

            currentXHR.onload = async () => {
                if(currentXHR.status === 200) {
                    await db.collection("files").add({
                        name: file.name, size: file.size,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    overlay.classList.add('translate-y-[200%]');
                }
            };
            currentXHR.send(file);
        }

        function copyLink(name) {
            navigator.clipboard.writeText(`${R2_PUBLIC_URL}/${encodeURIComponent(name)}`);
            alert("Share Link Copied!");
        }

        function openDownload(name, size) {
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('download-view').classList.remove('hidden');
            document.getElementById('dl-name').innerText = name;
            document.getElementById('dl-size').innerText = `${(size/(1024*1024)).toFixed(2)} MB`;
            document.getElementById('dl-link').href = `${R2_PUBLIC_URL}/${encodeURIComponent(name)}`;
        }

        function showDashboard() {
            document.getElementById('dashboard-view').classList.remove('hidden');
            document.getElementById('download-view').classList.add('hidden');
        }

        async function deleteFile(id, name) {
            if(confirm(`Hapus ${name}?`)) {
                await db.collection("files").doc(id).delete();
                await fetch(WORKER_URL, { method: "DELETE", headers: { "X-File-Name": name } });
            }
        }

        function renderFiles() {
            const grid = document.getElementById('files-grid');
            let filtered = allFiles.filter(f => {
                const ext = f.name.split('.').pop().toLowerCase();
                if(currentFilter === 'image') return ['jpg','png','jpeg','webp'].includes(ext);
                if(currentFilter === 'video') return ['mp4','mkv','mov'].includes(ext);
                if(currentFilter === 'app') return ['apk','zip','exe'].includes(ext);
                return true;
            });

            grid.innerHTML = filtered.map(f => `
                <div class="bg-white border border-slate-100 p-6 rounded-[2rem] file-card group relative" onclick="openDownload('${f.name}', ${f.size})">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-12 h-12 bg-slate-50 text-slate-400 rounded-xl flex items-center justify-center group-hover:bg-sky-500 group-hover:text-white transition-all">
                            <i data-lucide="file" class="w-6 h-6"></i>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="event.stopPropagation(); copyLink('${f.name}')" class="p-2 text-slate-300 hover:text-sky-500 transition-all"><i data-lucide="share-2" class="w-5 h-5"></i></button>
                            <button onclick="event.stopPropagation(); deleteFile('${f.id}', '${f.name}')" class="p-2 text-slate-300 hover:text-red-500 transition-all"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                    <h4 class="font-bold text-slate-700 truncate mb-1 text-sm">${f.name}</h4>
                    <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">${(f.size/(1024*1024)).toFixed(2)} MB</p>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function loadData() {
            db.collection("files").orderBy("timestamp", "desc").onSnapshot(snap => {
                allFiles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderFiles();
                
                // LOG
                document.getElementById('history-content').innerHTML = allFiles.slice(0,8).map(f => `
                    <div class="p-4 bg-slate-50 rounded-2xl">
                        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">New Upload</p>
                        <p class="text-xs font-bold text-slate-700 truncate mt-1">${f.name}</p>
                    </div>
                `).join('');

                // QUOTA
                const total = allFiles.reduce((acc, f) => acc + (f.size || 0), 0);
                const limit = (isPremium ? 20 : 10) * 1024 * 1024 * 1024;
                const pct = (total / limit) * 100;
                document.getElementById('usage-bar-top').style.width = Math.min(pct, 100) + "%";
            });
        }

        function upgradePlan() {
            if(confirm("Upgrade Premium 20GB?")) {
                isPremium = true;
                document.getElementById('plan-label').innerText = "Premium Plan";
                document.getElementById('plan-label').className = "text-[9px] font-black text-amber-500 uppercase tracking-widest";
                loadData();
            }
        }

        loadData();
    </script>
</body>
</html>
