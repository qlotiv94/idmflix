<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // 1. CONFIG FIREBASE MILIKMU
    const firebaseConfig = {
        apiKey: "AIzaSyAhuQBL_NhWiKwsq_m3r0fOwY-kIMt2MpI",
        authDomain: "idmflixid.firebaseapp.com",
        projectId: "idmflixid",
        storageBucket: "idmflixid.firebasestorage.app",
        messagingSenderId: "305447137906",
        appId: "1:305447137906:web:3dcadf2a9ca348fb1ac8eb"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storageLimit = 20 * 1024 * 1024 * 1024; // Limit 20GB

    // Inisialisasi Ikon Lucide
    lucide.createIcons();

    // 2. FUNGSI AMBIL DATA (REAL-TIME)
    // Setiap kali ada perubahan di Firebase, tampilan otomatis berubah tanpa refresh
    function loadFiles() {
        db.collection("files").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
            const files = [];
            let totalUsed = 0;
            
            snapshot.forEach((doc) => {
                const data = doc.data();
                files.push({ id: doc.id, ...data });
                totalUsed += data.size || 0;
            });
            
            render(files, totalUsed);
        }, (error) => {
            console.error("Error Firestore:", error);
            showNotif("Gagal ambil data database!");
        });
    }

    // 3. FUNGSI UPLOAD (SIMULASI KE NODE & CATAT KE FIREBASE)
    async function uploadSim(e) {
        const file = e.target.files[0];
        if(!file) return;

        showNotif("Mengenkripsi & Mengunggah...");

        try {
            // Kita catat metadata file ke Firestore
            await db.collection("files").add({
                name: file.name,
                size: file.size,
                provider: Math.random() > 0.5 ? 'R2' : 'B2',
                date: new Date().toLocaleDateString('id-ID'),
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            showNotif("Berhasil! File tercatat permanen.");
        } catch (err) {
            console.error(err);
            showNotif("Error: Pastikan Rule Firestore sudah 'Public'");
        }
        
        // Reset input file agar bisa upload file yang sama lagi
        e.target.value = '';
    }

    // 4. FUNGSI HAPUS FILE
    async function deleteFile(id) {
        if(confirm("Hapus catatan file ini dari server?")) {
            try {
                await db.collection("files").doc(id).delete();
                showNotif("File berhasil dihapus!");
            } catch (err) {
                showNotif("Gagal menghapus!");
            }
        }
    }

    // 5. RENDER TAMPILAN
    function render(files, totalUsed) {
        const grid = document.getElementById('files-grid');
        const empty = document.getElementById('empty-state');
        const usageBar = document.getElementById('usage-bar');
        const usagePercentText = document.getElementById('usage-percent');
        
        if(files.length > 0) {
            empty.classList.add('hidden');
            grid.innerHTML = files.map(f => `
                <div class="glass-card p-8 rounded-[3rem] hover:shadow-2xl hover:shadow-sky-100 transition-all group animate-fade">
                    <div class="flex justify-between items-start mb-10">
                        <div class="p-5 bg-sky-50 text-sky-600 rounded-2xl group-hover:bg-sky-600 group-hover:text-white transition-all">
                            <i data-lucide="file-text" class="w-8 h-8"></i>
                        </div>
                        <button onclick="deleteFile('${f.id}')" class="text-sky-200 hover:text-red-500 p-2 transition-colors">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <h4 class="font-bold text-xl text-sky-950 truncate" title="${f.name}">${f.name}</h4>
                    <div class="flex items-center justify-between mt-10 pt-6 border-t border-sky-50">
                        <span class="text-[10px] font-black text-sky-400 uppercase tracking-widest">${(f.size/1024).toFixed(1)} KB</span>
                        <span class="text-[9px] font-black px-3 py-1 bg-sky-50 text-sky-500 rounded-full uppercase tracking-widest border border-sky-100">Node: ${f.provider}</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        } else {
            empty.classList.remove('hidden');
            grid.innerHTML = '';
        }

        // Update Progress Bar Quota
        const percent = (totalUsed / storageLimit) * 100;
        usageBar.style.width = Math.min(Math.max(percent, 1), 100) + '%';
        usagePercentText.innerText = percent.toFixed(2) + '%';
    }

    function showNotif(msg) {
        const n = document.getElementById('notif');
        const m = document.getElementById('notif-msg');
        m.innerText = msg;
        n.classList.remove('translate-y-40');
        setTimeout(() => n.classList.add('translate-y-40'), 3000);
    }

    // Jalankan Load Data pertama kali
    loadFiles();
</script>
